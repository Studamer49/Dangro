services:
  - type: web
    name: dangro
    runtime: node
    plan: free
    buildCommand: |
      npm install --prefix server
      npm install --prefix client
      npm run build --prefix client
      cd server && npx prisma generate && cd ..
      npm run build --prefix server
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        value: https://dangro.onrender.com
      - key: PORT
        value: 3001
